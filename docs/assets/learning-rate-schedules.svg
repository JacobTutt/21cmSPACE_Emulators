<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">Learning-rate scheduler curves</title>
  <desc id="desc">Four small plots showing constant, cosine, warmup cosine, and exponential decay learning-rate schedules over training progress.</desc>
  <style>
    .bg { fill: #ffffff; }
    .panel { fill: #f8fafc; stroke: #d6dde6; stroke-width: 1.2; rx: 8; }
    .axis { stroke: #5d6b7a; stroke-width: 1.4; }
    .grid { stroke: #dbe2ea; stroke-width: 1; }
    .curve { fill: none; stroke: #2563eb; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    .warm { stroke: #dc2626; }
    .text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
    .title { font-size: 26px; font-weight: 700; }
    .label { font-size: 16px; font-weight: 650; }
    .small { font-size: 12px; fill: #516171; }
  </style>

  <rect class="bg" width="980" height="520"/>
  <text class="text title" x="40" y="48">Learning-rate schedules</text>

  <g transform="translate(40 72)">
    <rect class="panel" x="0" y="0" width="430" height="190"/>
    <text class="text label" x="24" y="31">Constant</text>
    <line class="grid" x1="62" y1="55" x2="390" y2="55"/>
    <line class="grid" x1="62" y1="145" x2="390" y2="145"/>
    <line class="axis" x1="62" y1="155" x2="390" y2="155"/>
    <line class="axis" x1="62" y1="45" x2="62" y2="155"/>
    <polyline class="curve" points="62,55 390,55"/>
    <text class="text small" x="62" y="175">training progress</text>
    <text class="text small" x="12" y="59">lr</text>
    <text class="text small" x="275" y="31">same step size throughout</text>
  </g>

  <g transform="translate(510 72)">
    <rect class="panel" x="0" y="0" width="430" height="190"/>
    <text class="text label" x="24" y="31">Cosine</text>
    <line class="grid" x1="62" y1="55" x2="390" y2="55"/>
    <line class="grid" x1="62" y1="145" x2="390" y2="145"/>
    <line class="axis" x1="62" y1="155" x2="390" y2="155"/>
    <line class="axis" x1="62" y1="45" x2="62" y2="155"/>
    <polyline class="curve" points="62,55 95,58 144,72 226,108 308,138 390,145"/>
    <text class="text small" x="62" y="175">training progress</text>
    <text class="text small" x="12" y="59">lr</text>
    <text class="text small" x="256" y="31">smooth decay to final fraction</text>
  </g>

  <g transform="translate(40 282)">
    <rect class="panel" x="0" y="0" width="430" height="190"/>
    <text class="text label" x="24" y="31">Warmup + cosine</text>
    <line class="grid" x1="62" y1="55" x2="390" y2="55"/>
    <line class="grid" x1="62" y1="145" x2="390" y2="145"/>
    <line class="axis" x1="62" y1="155" x2="390" y2="155"/>
    <line class="axis" x1="62" y1="45" x2="62" y2="155"/>
    <polyline class="curve warm" points="62,155 95,100 128,55 177,66 226,94 308,135 390,145"/>
    <text class="text small" x="62" y="175">training progress</text>
    <text class="text small" x="12" y="59">lr</text>
    <text class="text small" x="248" y="31">ramp up, then decay</text>
  </g>

  <g transform="translate(510 282)">
    <rect class="panel" x="0" y="0" width="430" height="190"/>
    <text class="text label" x="24" y="31">Exponential decay</text>
    <line class="grid" x1="62" y1="55" x2="390" y2="55"/>
    <line class="grid" x1="62" y1="145" x2="390" y2="145"/>
    <line class="axis" x1="62" y1="155" x2="390" y2="155"/>
    <line class="axis" x1="62" y1="45" x2="62" y2="155"/>
    <polyline class="curve" points="62,55 111,82 177,108 226,124 308,139 390,145"/>
    <text class="text small" x="62" y="175">training progress</text>
    <text class="text small" x="12" y="59">lr</text>
    <text class="text small" x="250" y="31">multiplicative decay</text>
  </g>
</svg>
