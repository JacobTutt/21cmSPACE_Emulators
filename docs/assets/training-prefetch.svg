<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">Training prefetch timeline</title>
  <desc id="desc">Timeline showing host batch preparation, device_put prefetch queue, and device compute overlap during JAX training.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 22px Arial, sans-serif; fill: #1f2933; }
      .label { font: 700 15px Arial, sans-serif; fill: #243447; }
      .text { font: 13px Arial, sans-serif; fill: #243447; }
      .small { font: 12px Arial, sans-serif; fill: #52606d; }
      .axis { stroke: #9aa5b1; stroke-width: 2; }
      .tick { stroke: #cbd2d9; stroke-width: 1; }
      .host { fill: #e6f4ea; stroke: #2f855a; stroke-width: 1.5; }
      .put { fill: #e8f0fe; stroke: #2f5fb3; stroke-width: 1.5; }
      .compute { fill: #fff4d6; stroke: #b7791f; stroke-width: 1.5; }
      .queue { fill: #f3e8ff; stroke: #7c3aed; stroke-width: 1.5; }
      .arrow { stroke: #52606d; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #7c8794; stroke-width: 1.5; stroke-dasharray: 5 5; fill: none; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#52606d"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="960" height="430"/>
  <text class="title" x="40" y="42">Mini-batch prefetching during one epoch</text>
  <text class="small" x="40" y="66">Host arrays are sliced into fixed-shape batches. device_put queues a small FIFO of device batches while compiled train steps consume older batches.</text>

  <line class="axis" x1="190" y1="95" x2="900" y2="95"/>
  <text class="small" x="880" y="84">time</text>
  <line class="tick" x1="260" y1="86" x2="260" y2="330"/>
  <line class="tick" x1="390" y1="86" x2="390" y2="330"/>
  <line class="tick" x1="520" y1="86" x2="520" y2="330"/>
  <line class="tick" x1="650" y1="86" x2="650" y2="330"/>
  <line class="tick" x1="780" y1="86" x2="780" y2="330"/>

  <text class="label" x="40" y="135">Host</text>
  <text class="small" x="40" y="153">slice, shuffle, pad, mask</text>
  <rect class="host" x="210" y="116" width="120" height="34" rx="5"/>
  <text class="text" x="238" y="138">prepare B0</text>
  <rect class="host" x="340" y="116" width="120" height="34" rx="5"/>
  <text class="text" x="368" y="138">prepare B1</text>
  <rect class="host" x="470" y="116" width="120" height="34" rx="5"/>
  <text class="text" x="498" y="138">prepare B2</text>
  <rect class="host" x="600" y="116" width="120" height="34" rx="5"/>
  <text class="text" x="628" y="138">prepare B3</text>

  <text class="label" x="40" y="208">device_put</text>
  <text class="small" x="40" y="226">enqueue transfer</text>
  <rect class="put" x="260" y="190" width="86" height="30" rx="5"/>
  <text class="text" x="278" y="210">put B0</text>
  <rect class="put" x="390" y="190" width="86" height="30" rx="5"/>
  <text class="text" x="408" y="210">put B1</text>
  <rect class="put" x="520" y="190" width="86" height="30" rx="5"/>
  <text class="text" x="538" y="210">put B2</text>
  <rect class="put" x="650" y="190" width="86" height="30" rx="5"/>
  <text class="text" x="668" y="210">put B3</text>

  <text class="label" x="40" y="278">Device</text>
  <text class="small" x="40" y="296">compiled train_step</text>
  <rect class="compute" x="355" y="258" width="135" height="38" rx="5"/>
  <text class="text" x="386" y="282">compute B0</text>
  <rect class="compute" x="495" y="258" width="135" height="38" rx="5"/>
  <text class="text" x="526" y="282">compute B1</text>
  <rect class="compute" x="635" y="258" width="135" height="38" rx="5"/>
  <text class="text" x="666" y="282">compute B2</text>
  <rect class="compute" x="775" y="258" width="105" height="38" rx="5"/>
  <text class="text" x="800" y="282">compute B3</text>

  <path class="arrow" d="M 330 133 C 350 140, 350 185, 260 196"/>
  <path class="arrow" d="M 460 133 C 480 140, 480 185, 390 196"/>
  <path class="arrow" d="M 590 133 C 610 140, 610 185, 520 196"/>
  <path class="arrow" d="M 720 133 C 740 140, 740 185, 650 196"/>

  <path class="arrow" d="M 346 205 C 360 218, 360 248, 375 258"/>
  <path class="arrow" d="M 476 205 C 500 218, 500 248, 515 258"/>
  <path class="arrow" d="M 606 205 C 640 218, 640 248, 655 258"/>
  <path class="arrow" d="M 736 205 C 780 218, 780 248, 795 258"/>

  <rect class="queue" x="402" y="340" width="190" height="36" rx="5"/>
  <text class="text" x="423" y="363">FIFO queue, size = prefetch_batches</text>
  <path class="dash" d="M 435 340 C 420 316, 410 300, 405 296"/>
  <path class="dash" d="M 565 340 C 590 315, 615 300, 635 296"/>

  <text class="small" x="40" y="402">Overlap is opportunistic: JAX dispatch and device_put can run asynchronously, but the code does not start a separate Python worker.</text>
</svg>
