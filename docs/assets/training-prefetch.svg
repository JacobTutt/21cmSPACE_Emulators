<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">Mini-batch loading and asynchronous prefetching</title>
  <desc id="desc">A two-row comparison. The top row shows sequential prepare, move, train mini-batches with GPU idle gaps. The bottom row shows asynchronous prefetching where future batches are prepared and moved while the current batch trains, giving higher throughput and less wasted GPU time.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.4; }
      .prepare { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.5; }
      .move { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 1.5; }
      .train { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
      .idle { fill: #fee2e2; stroke: #dc2626; stroke-width: 1.2; opacity: 0.8; }
      .axis { stroke: #64748b; stroke-width: 1.6; marker-end: url(#arrow); }
      .dash { stroke: #cbd5e1; stroke-width: 1; stroke-dasharray: 4 5; }
      .arrow { stroke: #1f2937; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 23px; font-weight: 700; fill: #0f172a; }
      .section { font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 700; fill: #0f172a; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 14px; font-weight: 700; fill: #0f172a; }
      .text { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #0f172a; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #475569; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; font-size: 12px; fill: #0f172a; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1000" height="560"/>
  <text class="title" x="40" y="44">Mini-batch Training: Sequential Loading vs Asynchronous Prefetching</text>

  <rect class="panel" x="40" y="75" width="920" height="195" rx="10"/>
  <text class="section" x="65" y="108">Inefficient sequential mini-batches</text>
  <text class="small" x="65" y="130">Each batch is prepared, moved, and trained before the next batch starts.</text>

  <line class="axis" x1="165" y1="155" x2="910" y2="155"/>
  <text class="small" x="887" y="144">time</text>

  <text class="label" x="70" y="188">Batch 0</text>
  <rect class="prepare" x="170" y="170" width="95" height="34" rx="5"/>
  <text class="text" x="193" y="192">Prepare</text>
  <rect class="move" x="270" y="170" width="80" height="34" rx="5"/>
  <text class="text" x="293" y="192">Move</text>
  <rect class="train" x="355" y="170" width="115" height="34" rx="5"/>
  <text class="text" x="397" y="192">Train</text>

  <text class="label" x="70" y="232">Batch 1</text>
  <rect class="prepare" x="480" y="214" width="95" height="34" rx="5"/>
  <text class="text" x="503" y="236">Prepare</text>
  <rect class="move" x="580" y="214" width="80" height="34" rx="5"/>
  <text class="text" x="603" y="236">Move</text>
  <rect class="train" x="665" y="214" width="115" height="34" rx="5"/>
  <text class="text" x="707" y="236">Train</text>

  <rect class="idle" x="170" y="214" width="180" height="34" rx="5"/>
  <text class="text" x="219" y="236">GPU idle</text>
  <rect class="idle" x="480" y="170" width="180" height="34" rx="5"/>
  <text class="text" x="529" y="192">GPU idle</text>

  <line class="dash" x1="470" y1="155" x2="470" y2="255"/>
  <text class="small" x="805" y="192">host work blocks GPU work</text>
  <path class="arrow" d="M 795 200 C 745 204, 690 200, 660 188"/>

  <rect class="panel" x="40" y="305" width="920" height="200" rx="10"/>
  <text class="section" x="65" y="338">Asynchronous prefetching</text>
  <text class="small" x="65" y="360">Future batches are prepared and transferred while the current batch is training on the device.</text>

  <line class="axis" x1="165" y1="385" x2="910" y2="385"/>
  <text class="small" x="887" y="374">time</text>

  <text class="label" x="70" y="417">Host</text>
  <rect class="prepare" x="170" y="398" width="95" height="34" rx="5"/>
  <text class="text" x="193" y="420">Prepare</text>
  <rect class="prepare" x="355" y="398" width="95" height="34" rx="5"/>
  <text class="text" x="378" y="420">Prepare</text>
  <rect class="prepare" x="540" y="398" width="95" height="34" rx="5"/>
  <text class="text" x="563" y="420">Prepare</text>

  <text class="label" x="70" y="459">Move</text>
  <rect class="move" x="270" y="440" width="80" height="34" rx="5"/>
  <text class="text" x="293" y="462">Move</text>
  <rect class="move" x="455" y="440" width="80" height="34" rx="5"/>
  <text class="text" x="478" y="462">Move</text>
  <rect class="move" x="640" y="440" width="80" height="34" rx="5"/>
  <text class="text" x="663" y="462">Move</text>

  <text class="label" x="70" y="500">GPU</text>
  <rect class="train" x="355" y="482" width="115" height="34" rx="5"/>
  <text class="text" x="397" y="504">Train</text>
  <rect class="train" x="540" y="482" width="115" height="34" rx="5"/>
  <text class="text" x="582" y="504">Train</text>
  <rect class="train" x="725" y="482" width="115" height="34" rx="5"/>
  <text class="text" x="767" y="504">Train</text>

  <path class="arrow" d="M 265 415 C 292 420, 298 432, 310 440"/>
  <path class="arrow" d="M 350 457 C 366 468, 378 475, 394 482"/>
  <path class="arrow" d="M 450 415 C 477 420, 483 432, 495 440"/>
  <path class="arrow" d="M 535 457 C 551 468, 563 475, 579 482"/>
  <path class="arrow" d="M 635 415 C 662 420, 668 432, 680 440"/>
  <path class="arrow" d="M 720 457 C 736 468, 748 475, 764 482"/>

  <path class="arrow" d="M 790 330 C 855 355, 888 409, 876 469"/>
  <text class="label" x="770" y="315">Higher throughput</text>
  <text class="small" x="770" y="535">less wasted GPU time</text>

  <rect class="prepare" x="56" y="522" width="16" height="12" rx="2"/>
  <text class="small" x="78" y="533">Prepare mini-batch on host</text>
  <rect class="move" x="250" y="522" width="16" height="12" rx="2"/>
  <text class="small" x="272" y="533">Move with device_put</text>
  <rect class="train" x="424" y="522" width="16" height="12" rx="2"/>
  <text class="small" x="446" y="533">Train with jitted step</text>
</svg>
