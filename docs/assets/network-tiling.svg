<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="520" viewBox="0 0 1040 520" role="img" aria-labelledby="title desc">
  <title id="title">Vector-output and tiled scalar-output emulator comparison</title>
  <desc id="desc">Schematic comparing traditional vector-output emulation with tiled scalar-output emulation and vectorized reconstruction.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.5; }
      .box-blue { fill: #e0f2fe; stroke: #0284c7; stroke-width: 1.5; }
      .box-green { fill: #dcfce7; stroke: #16a34a; stroke-width: 1.5; }
      .box-amber { fill: #fef3c7; stroke: #d97706; stroke-width: 1.5; }
      .box-red { fill: #fee2e2; stroke: #dc2626; stroke-width: 1.5; }
      .node { fill: #ffffff; stroke: #475569; stroke-width: 1.2; }
      .hidden { fill: #dbeafe; stroke: #2563eb; stroke-width: 1.2; }
      .out { fill: #fee2e2; stroke: #dc2626; stroke-width: 1.2; }
      .line { stroke: #64748b; stroke-width: 1.1; }
      .arrow { stroke: #334155; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #0f172a; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #334155; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; font-size: 12px; fill: #0f172a; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 20px; font-weight: 700; fill: #0f172a; }
      .section { font-family: Arial, Helvetica, sans-serif; font-size: 15px; font-weight: 700; fill: #0f172a; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1040" height="520"/>
  <text class="title" x="40" y="38">Emulator output strategies</text>
  <text class="small" x="40" y="60">Traditional vector outputs fix the target grid in the readout layer; tiled scalar outputs move coordinates into the input.</text>

  <rect class="panel" x="40" y="92" width="460" height="180" rx="8"/>
  <text class="section" x="62" y="122">Traditional vector-output emulation</text>
  <rect class="box-blue" x="62" y="148" width="130" height="44" rx="6"/>
  <text class="mono" x="80" y="174">theta_1..theta_n</text>
  <path class="arrow" d="M 200 170 L 260 170"/>
  <rect class="box-green" x="268" y="138" width="78" height="64" rx="6"/>
  <text class="mono" x="288" y="166">NN</text>
  <text class="small" x="282" y="186">readout</text>
  <path class="arrow" d="M 354 170 L 412 170"/>
  <rect class="box-red" x="420" y="132" width="58" height="76" rx="6"/>
  <line class="line" x1="430" y1="146" x2="468" y2="146"/>
  <line class="line" x1="430" y1="158" x2="468" y2="158"/>
  <line class="line" x1="430" y1="170" x2="468" y2="170"/>
  <line class="line" x1="430" y1="182" x2="468" y2="182"/>
  <line class="line" x1="430" y1="194" x2="468" y2="194"/>
  <text class="small" x="62" y="232">Physical variables map directly to a full spectrum or grid.</text>
  <text class="mono" x="62" y="252">f(theta) -> [y_1, ..., y_m]</text>

  <rect class="panel" x="540" y="92" width="460" height="180" rx="8"/>
  <text class="section" x="562" y="122">Tiled scalar-output emulation</text>
  <rect class="box-amber" x="562" y="142" width="104" height="36" rx="6"/>
  <text class="mono" x="584" y="165">z, k</text>
  <rect class="box-blue" x="562" y="190" width="130" height="44" rx="6"/>
  <text class="mono" x="580" y="216">theta_1..theta_n</text>
  <path class="arrow" d="M 704 188 L 764 188"/>
  <rect class="box-green" x="772" y="154" width="78" height="68" rx="6"/>
  <text class="mono" x="792" y="184">NN</text>
  <text class="small" x="792" y="204">MLP</text>
  <path class="arrow" d="M 858 188 L 918 188"/>
  <rect class="box-red" x="926" y="166" width="50" height="44" rx="6"/>
  <text class="mono" x="940" y="192">y</text>
  <text class="small" x="562" y="252">Physical variables plus one coordinate location map to one scalar value.</text>
  <text class="mono" x="562" y="272">f([z, k, theta]) -> y_hat</text>

  <path class="arrow" d="M 330 294 C 430 346, 610 346, 710 294"/>
  <text class="section" x="392" y="338">Vectorized call and reconstruction</text>

  <rect class="panel" x="130" y="370" width="780" height="110" rx="8"/>
  <rect class="box-amber" x="160" y="402" width="138" height="42" rx="6"/>
  <text class="mono" x="177" y="427">coordinate grid</text>
  <path class="arrow" d="M 310 423 L 382 423"/>
  <rect class="box-green" x="392" y="394" width="118" height="58" rx="6"/>
  <text class="mono" x="417" y="419">batched</text>
  <text class="mono" x="423" y="438">MLP</text>
  <path class="arrow" d="M 522 423 L 594 423"/>
  <rect class="box-red" x="604" y="402" width="110" height="42" rx="6"/>
  <text class="mono" x="624" y="427">flat y_hat</text>
  <path class="arrow" d="M 726 423 L 798 423"/>
  <rect class="box-blue" x="808" y="392" width="72" height="62" rx="6"/>
  <line class="line" x1="820" y1="406" x2="868" y2="406"/>
  <line class="line" x1="820" y1="419" x2="868" y2="419"/>
  <line class="line" x1="820" y1="432" x2="868" y2="432"/>
  <line class="line" x1="820" y1="445" x2="868" y2="445"/>
  <text class="small" x="805" y="470">spectrum/grid</text>
  <text class="small" x="160" y="468">Evaluate every requested coordinate row, then reshape predictions onto the physical axes.</text>
</svg>
