<svg xmlns="http://www.w3.org/2000/svg" width="920" height="330" viewBox="0 0 920 330" role="img" aria-labelledby="title desc">
  <title id="title">Checkpoint bundle</title>
  <desc id="desc">Diagram showing that a nenemu checkpoint stores model weights, architecture settings, loss history, and preprocessing metadata.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#314155"/>
    </marker>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #172033; }
      .label { font: 700 16px Arial, sans-serif; fill: #172033; }
      .text { font: 14px Arial, sans-serif; fill: #314155; }
      .small { font: 13px Arial, sans-serif; fill: #46556a; }
      .box { fill: #ffffff; stroke: #8ea0b8; stroke-width: 1.5; rx: 8; }
      .main { fill: #eef5ff; stroke: #5d7fa8; stroke-width: 2; rx: 10; }
      .state { fill: #f2fbf5; stroke: #5d9a73; stroke-width: 1.5; rx: 8; }
      .config { fill: #fff7ec; stroke: #bd7a30; stroke-width: 1.5; rx: 8; }
      .line { stroke: #314155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="920" height="330" fill="#ffffff"/>
  <text x="460" y="42" text-anchor="middle" class="title">Saved Emulator Package</text>

  <rect x="50" y="98" width="210" height="110" class="box"/>
  <text x="155" y="132" text-anchor="middle" class="label">Trained DenseMLP</text>
  <text x="155" y="158" text-anchor="middle" class="text">live Flax NNX model</text>
  <text x="155" y="181" text-anchor="middle" class="small">after optimisation</text>

  <path d="M270 153 H345" class="line"/>

  <rect x="355" y="78" width="210" height="150" class="main"/>
  <text x="460" y="112" text-anchor="middle" class="label">model.nenemu</text>
  <text x="460" y="139" text-anchor="middle" class="text">Orbax checkpoint directory</text>
  <text x="460" y="168" text-anchor="middle" class="small">step 0 by default</text>
  <text x="460" y="192" text-anchor="middle" class="small">loads latest step by default</text>

  <path d="M575 120 H650" class="line"/>
  <path d="M575 185 H650" class="line"/>

  <rect x="660" y="72" width="210" height="86" class="state"/>
  <text x="765" y="103" text-anchor="middle" class="label">state/</text>
  <text x="765" y="128" text-anchor="middle" class="text">weights and biases</text>

  <rect x="660" y="178" width="210" height="98" class="config"/>
  <text x="765" y="209" text-anchor="middle" class="label">config/</text>
  <text x="765" y="234" text-anchor="middle" class="text">architecture, losses</text>
  <text x="765" y="256" text-anchor="middle" class="text">and preprocessing contract</text>
</svg>
