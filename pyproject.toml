[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nenufar-emulators"
version = "0.1.0"
description = "JAX-native emulators for NenuFAR-era 21-cm inference workflows."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "jax",
  "flax",
  "optax",
  "numpy",
  "scipy",
]

[project.optional-dependencies]
dev = [
  "pytest",
]

[project.scripts]
nenufar-delta21-train = "nenufar_emulators.delta21.train:main"
nenufar-delta21-infer = "nenufar_emulators.delta21.infer:main"
nenufar-t21-train = "nenufar_emulators.t21.train:main"
nenufar-t21-infer = "nenufar_emulators.t21.infer:main"

[tool.setuptools]
package-dir = {"" = "src_jax"}

[tool.setuptools.packages.find]
where = ["src_jax"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src_jax"]
